---
# Jenkins needs several GB free on the root volume (plugins, updates, Docker layers).
# If free space falls near ~1 GiB, the built-in node may go offline and the UI can break.
- name: Configure EC2 and deploy Jenkins
  hosts: app
  become: true

  vars:
    jenkins_docker_repo: "jenkins/jenkins"
    # Bump intentionally. For an exact pin, set jenkins_docker_digest (sha256:...) and re-run.
    jenkins_docker_tag: "lts-jdk21"
    jenkins_docker_digest: ""
    container_name: "jenkins"
    jenkins_home: "/var/lib/docker/volumes/jenkins_home/_data"
    jenkins_admin_user: "admin"
    jenkins_admin_password: "admin"
    # Job definitions only. Pipelines use AWS (Secrets Manager + IAM on the Jenkins host) for Docker Hub and Git tag; SCM has no Jenkins credential if repo is public.
    jenkins_cli_ci_repo: "https://github.com/ron1120/devops-eks-project.git"
    jenkins_cli_ci_branch: "*/main"
    jenkins_cli_ci_git_credentials: ""
    jenkins_cli_ci_jenkinsfile: "jenkins/Jenkinsfile.cli"
    jenkins_engine_ci_repo: "https://github.com/ron1120/devops-eks-project.git"
    jenkins_engine_ci_branch: "*/main"
    jenkins_engine_ci_git_credentials: ""
    jenkins_engine_ci_jenkinsfile: "jenkins/Jenkinsfile.engine"
    jenkins_cd_repo: "https://github.com/ron1120/devops-eks-project.git"
    jenkins_cd_branch: "*/main"
    jenkins_cd_git_credentials: ""
    jenkins_cd_jenkinsfile: "jenkins/Jenkinsfile.cd"

  pre_tasks:
    - name: Resolve Jenkins container image reference
      ansible.builtin.set_fact:
        docker_image: >-
          {{
            (jenkins_docker_repo ~ '@' ~ (jenkins_docker_digest | trim))
            if (jenkins_docker_digest | default('') | trim | length) > 0
            else (jenkins_docker_repo ~ ':' ~ jenkins_docker_tag)
          }}

  tasks:
    # ── System Updates ──
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist

    # ── Python Installation ──
    - name: Install Python and dependencies
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    # ── Docker Prerequisites ──
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    # ── Docker CE Installation ──
    - name: Download Docker install script
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"

    - name: Run Docker install script
      command: sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: true

    # ── Reset SSH connection to pick up docker group ──
    - name: Reset SSH connection
      meta: reset_connection

    # ── Jenkins Deployment ──
    - name: Pull Jenkins Docker image
      docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Run Jenkins container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - jenkins_home:/var/jenkins_home
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          AWS_REGION: "us-east-1"
          JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"

    # ── Jenkins Plugins ──
    - name: Install Jenkins plugins
      command: >
        docker exec {{ container_name }}
        jenkins-plugin-cli --plugins
        workflow-aggregator git github docker-workflow
        credentials credentials-binding junit timestamper
        pipeline-stage-view ws-cleanup
      changed_when: true

    # ── Jenkins Container Dependencies ──
    - name: Install Python inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "apt-get update && apt-get install -y python3 python3-venv python3-pip"
      changed_when: true

    - name: Install Docker prerequisites inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "apt-get install -y apt-transport-https ca-certificates gnupg lsb-release curl"
      changed_when: true

    - name: Install Docker CE inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "curl -fsSL https://get.docker.com -o /tmp/get-docker.sh && sh /tmp/get-docker.sh"
      changed_when: true

    - name: Add jenkins user to docker group inside container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "usermod -aG docker jenkins"
      changed_when: true

    - name: Fix Docker socket permissions
      file:
        path: /var/run/docker.sock
        mode: "0666"

    # ── AWS CLI inside Jenkins container ──
    - name: Install AWS CLI inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "pip install --break-system-packages awscli 2>/dev/null || pip install awscli"
      changed_when: true

    # ── Credentials from Secrets Manager (Groovy init script) ──
    - name: Create init.groovy.d directory
      file:
        path: "{{ jenkins_home }}/init.groovy.d"
        state: directory
        mode: "0755"

    - name: Remove deprecated credential bootstrap files (Git/Docker use AWS Secrets Manager in pipelines)
      ansible.builtin.file:
        path: "{{ jenkins_home }}/{{ item }}"
        state: absent
      loop:
        - "jenkins-bootstrap.env"
        - "init.groovy.d/00-bootstrap-credentials-from-env.groovy"
        - "init.groovy.d/aws-secrets.groovy"

    - name: Deploy admin user creation script
      copy:
        dest: "{{ jenkins_home }}/init.groovy.d/create-admin.groovy"
        mode: "0644"
        content: |
          import jenkins.model.*
          import hudson.security.*

          def instance = Jenkins.getInstance()
          def hudsonRealm = new HudsonPrivateSecurityRealm(false)
          hudsonRealm.createAccount("{{ jenkins_admin_user }}", "{{ jenkins_admin_password }}")
          instance.setSecurityRealm(hudsonRealm)

          def strategy = new FullControlOnceLoggedInAuthorizationStrategy()
          strategy.setAllowAnonymousRead(false)
          instance.setAuthorizationStrategy(strategy)
          instance.save()
          println("[Jenkins Init] Admin user '{{ jenkins_admin_user }}' created")

    - name: Deploy cli-ci pipeline job (SCM + cli/ path filter)
      copy:
        dest: "{{ jenkins_home }}/init.groovy.d/zzz-cli-ci-job.groovy"
        mode: "0644"
        content: |
          import jenkins.model.Jenkins
          import org.jenkinsci.plugins.workflow.job.WorkflowJob
          import org.jenkinsci.plugins.workflow.cps.CpsScmFlowDefinition
          import org.jenkinsci.plugins.workflow.job.properties.PipelineTriggersJobProperty
          import hudson.plugins.git.GitSCM
          import hudson.plugins.git.BranchSpec
          import hudson.plugins.git.UserRemoteConfig
          import hudson.plugins.git.extensions.impl.PathRestriction
          import hudson.triggers.SCMTrigger

          def jenkins = Jenkins.instance
          def jobName = "cli-ci"

          WorkflowJob job = jenkins.getItem(jobName) as WorkflowJob
          if (job == null) {
              job = jenkins.createProject(WorkflowJob, jobName)
          }

          def remotes = [
              new UserRemoteConfig(
                  "{{ jenkins_cli_ci_repo }}",
                  "origin",
                  "",
                  "{{ jenkins_cli_ci_git_credentials }}"
              )
          ]
          def branches = [new BranchSpec("{{ jenkins_cli_ci_branch }}")]
          def extensions = [new PathRestriction("^cli/.*", "")]

          def scm = new GitSCM(
              remotes,
              branches,
              false,
              [],
              null,
              null,
              extensions
          )

          job.setDefinition(new CpsScmFlowDefinition(scm, "{{ jenkins_cli_ci_jenkinsfile }}"))

          def triggers = []
          triggers.add(new SCMTrigger("H/5 * * * *"))
          try {
              def pushTriggerClass = Class.forName("com.cloudbees.jenkins.GitHubPushTrigger")
              triggers.add(pushTriggerClass.getDeclaredConstructor().newInstance())
          } catch (Throwable t) {
              println("[Jenkins Init] GitHubPushTrigger not available, using SCM polling only: " + t.message)
          }

          job.removeProperty(PipelineTriggersJobProperty)
          job.addProperty(new PipelineTriggersJobProperty(triggers))

          job.save()
          println("[Jenkins Init] Pipeline job '${jobName}' configured (SCM + included region ^cli/.*)")

    - name: Deploy engine-ci pipeline job (SCM + engine/ path filter)
      copy:
        dest: "{{ jenkins_home }}/init.groovy.d/zzz-engine-ci-job.groovy"
        mode: "0644"
        content: |
          import jenkins.model.Jenkins
          import org.jenkinsci.plugins.workflow.job.WorkflowJob
          import org.jenkinsci.plugins.workflow.cps.CpsScmFlowDefinition
          import org.jenkinsci.plugins.workflow.job.properties.PipelineTriggersJobProperty
          import hudson.plugins.git.GitSCM
          import hudson.plugins.git.BranchSpec
          import hudson.plugins.git.UserRemoteConfig
          import hudson.plugins.git.extensions.impl.PathRestriction
          import hudson.triggers.SCMTrigger

          def jenkins = Jenkins.instance
          def jobName = "engine-ci"

          WorkflowJob job = jenkins.getItem(jobName) as WorkflowJob
          if (job == null) {
              job = jenkins.createProject(WorkflowJob, jobName)
          }

          def remotes = [
              new UserRemoteConfig(
                  "{{ jenkins_engine_ci_repo }}",
                  "origin",
                  "",
                  "{{ jenkins_engine_ci_git_credentials }}"
              )
          ]
          def branches = [new BranchSpec("{{ jenkins_engine_ci_branch }}")]
          def extensions = [new PathRestriction("^engine/.*", "")]

          def scm = new GitSCM(
              remotes,
              branches,
              false,
              [],
              null,
              null,
              extensions
          )

          job.setDefinition(new CpsScmFlowDefinition(scm, "{{ jenkins_engine_ci_jenkinsfile }}"))

          def triggers = []
          triggers.add(new SCMTrigger("H/5 * * * *"))
          try {
              def pushTriggerClass = Class.forName("com.cloudbees.jenkins.GitHubPushTrigger")
              triggers.add(pushTriggerClass.getDeclaredConstructor().newInstance())
          } catch (Throwable t) {
              println("[Jenkins Init] GitHubPushTrigger not available, using SCM polling only: " + t.message)
          }

          job.removeProperty(PipelineTriggersJobProperty)
          job.addProperty(new PipelineTriggersJobProperty(triggers))

          job.save()
          println("[Jenkins Init] Pipeline job '${jobName}' configured (SCM + included region ^engine/.*)")

    - name: Deploy cd pipeline job (manual trigger)
      copy:
        dest: "{{ jenkins_home }}/init.groovy.d/zzz-cd-job.groovy"
        mode: "0644"
        content: |
          import jenkins.model.Jenkins
          import org.jenkinsci.plugins.workflow.job.WorkflowJob
          import org.jenkinsci.plugins.workflow.cps.CpsScmFlowDefinition
          import hudson.plugins.git.GitSCM
          import hudson.plugins.git.BranchSpec
          import hudson.plugins.git.UserRemoteConfig

          def jenkins = Jenkins.instance
          def jobName = "cd"

          WorkflowJob job = jenkins.getItem(jobName) as WorkflowJob
          if (job == null) {
              job = jenkins.createProject(WorkflowJob, jobName)
          }

          def remotes = [
              new UserRemoteConfig(
                  "{{ jenkins_cd_repo }}",
                  "origin",
                  "",
                  "{{ jenkins_cd_git_credentials }}"
              )
          ]
          def branches = [new BranchSpec("{{ jenkins_cd_branch }}")]

          def scm = new GitSCM(
              remotes,
              branches,
              false,
              [],
              null,
              null,
              []
          )

          job.setDefinition(new CpsScmFlowDefinition(scm, "{{ jenkins_cd_jenkinsfile }}"))
          job.save()
          println("[Jenkins Init] Pipeline job '${jobName}' configured (manual trigger, SCM)")

    - name: Restart Jenkins container to pick up changes
      docker_container:
        name: "{{ container_name }}"
        state: started
        restart: true