# Automation engine: persistent workdir (workflows, logs) + HTTP on 8080 (see engine/configuration/config.yaml).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sawe-engine
  labels:
    app.kubernetes.io/name: sawe-engine
    app.kubernetes.io/component: engine
spec:
  serviceName: sawe-engine-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: sawe-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sawe-engine
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: fix-permissions
          image: sawe-engine:latest
          command: ["sh", "-c", "chown -R 999:999 /app/seyoawe-community"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: engine-data
              mountPath: /app/seyoawe-community
      containers:
        - name: engine
          image: sawe-engine:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: engine-data
              mountPath: /app/seyoawe-community
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: engine-data
      spec:
        storageClassName: gp2
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
