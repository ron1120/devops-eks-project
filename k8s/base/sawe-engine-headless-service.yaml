# Stable DNS for StatefulSet pods: sawe-engine-0.sawe-engine-headless.seyoawe.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: sawe-engine-headless
  labels:
    app.kubernetes.io/name: sawe-engine
    app.kubernetes.io/component: engine
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: sawe-engine
  ports:
    - port: 8080
      targetPort: http
      name: http
