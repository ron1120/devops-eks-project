apiVersion: v1
kind: Service
metadata:
  name: seyoawe-engine
  namespace: seyoawe
spec:
  selector:
    app: seyoawe-engine
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: dispatcher
      protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
