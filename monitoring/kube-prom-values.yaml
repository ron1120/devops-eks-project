# kube-prometheus-stack values for the devops-eks-cluster.
# Install / upgrade:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prom prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace \
#     -f monitoring/kube-prom-values.yaml
#
# The chart deploys Prometheus, Alertmanager, Grafana, node-exporter, and kube-state-metrics.

prometheus:
  prometheusSpec:
    retention: 10d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

grafana:
  adminPassword: "admin"            # change after first login via the UI
  defaultDashboardsTimezone: browser
  service:
    type: LoadBalancer              # exposes Grafana via an AWS ELB
    port: 80
  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
    datasources:
      enabled: true

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

  # Alert routing. Default severity goes to #alerts; "critical" is fanned out
  # to #alerts-critical. Replace the Slack webhook with your own from:
  #   Slack → Apps → "Incoming Webhooks" → Add to workspace
  # For a quick demo without Slack, point api_url at https://webhook.site/<id>.
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack-default
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers:
            - severity = "critical"
          receiver: slack-critical
    receivers:
      - name: "null"
      - name: slack-default
        slack_configs:
          - api_url: "https://hooks.slack.com/services/REPLACE/ME/WITH-YOUR-WEBHOOK"
            channel: "#alerts"
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
      - name: slack-critical
        slack_configs:
          - api_url: "https://hooks.slack.com/services/REPLACE/ME/WITH-YOUR-WEBHOOK"
            channel: "#alerts-critical"
            send_resolved: true
            title: "[CRITICAL] {{ .CommonLabels.alertname }}"
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
