---
- name: Configure EC2 and deploy Jenkins
  hosts: app
  become: true

  vars:
    docker_image: "jenkins/jenkins:lts"
    container_name: "jenkins"
    jenkins_home: "/var/lib/docker/volumes/jenkins_home/_data"
    jenkins_admin_user: "admin"
    jenkins_admin_password: "admin"

  tasks:
    # ── System Updates ──
    - name: Update and upgrade apt packages
      apt:
        update_cache: true
        upgrade: dist

    # ── Python Installation ──
    - name: Install Python and dependencies
      apt:
        name:
          - python3
          - python3-venv
          - python3-pip
        state: present

    # ── Docker Prerequisites ──
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    # ── Docker CE Installation ──
    - name: Download Docker install script
      get_url:
        url: https://get.docker.com
        dest: /tmp/get-docker.sh
        mode: "0755"

    - name: Run Docker install script
      command: sh /tmp/get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: true

    # ── Reset SSH connection to pick up docker group ──
    - name: Reset SSH connection
      meta: reset_connection

    # ── Jenkins Deployment ──
    - name: Pull Jenkins Docker image
      docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Run Jenkins container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "8080:8080"
          - "50000:50000"
        volumes:
          - jenkins_home:/var/jenkins_home
          - /var/run/docker.sock:/var/run/docker.sock
        env:
          AWS_REGION: "us-east-1"

    # ── Jenkins Container Dependencies ──
    - name: Install Python inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "apt-get update && apt-get install -y python3 python3-venv python3-pip"
      changed_when: true

    - name: Install Docker prerequisites inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "apt-get install -y apt-transport-https ca-certificates gnupg lsb-release curl"
      changed_when: true

    - name: Install Docker CE inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "curl -fsSL https://get.docker.com -o /tmp/get-docker.sh && sh /tmp/get-docker.sh"
      changed_when: true

    - name: Add jenkins user to docker group inside container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "usermod -aG docker jenkins"
      changed_when: true

    - name: Fix Docker socket permissions
      file:
        path: /var/run/docker.sock
        mode: "0666"

    # ── AWS CLI inside Jenkins container ──
    - name: Install AWS CLI inside Jenkins container
      command: >
        docker exec -u root {{ container_name }} bash -c
        "pip install --break-system-packages awscli 2>/dev/null || pip install awscli"
      changed_when: true

    # ── Credentials from Secrets Manager (Groovy init script) ──
    - name: Create init.groovy.d directory
      file:
        path: "{{ jenkins_home }}/init.groovy.d"
        state: directory
        mode: "0755"

    - name: Deploy Secrets Manager credentials sync script
      copy:
        dest: "{{ jenkins_home }}/init.groovy.d/aws-secrets.groovy"
        mode: "0644"
        content: |
          import com.cloudbees.plugins.credentials.*
          import com.cloudbees.plugins.credentials.domains.*
          import com.cloudbees.plugins.credentials.impl.*
          import groovy.json.JsonSlurper

          def fetchSecret(String secretId) {
              def awsRegion = System.getenv("AWS_REGION") ?: "us-east-1"
              def cmd = ["aws", "secretsmanager", "get-secret-value",
                         "--secret-id", secretId, "--region", awsRegion,
                         "--query", "SecretString", "--output", "text"]
              def proc = cmd.execute()
              proc.waitFor()
              if (proc.exitValue() == 0) {
                  return new JsonSlurper().parseText(proc.text.trim())
              }
              println("[AWS Secrets] Failed to fetch ${secretId}: ${proc.err.text}")
              return null
          }

          def createOrUpdate(String id, String user, String pass) {
              def store = SystemCredentialsProvider.getInstance().getStore()
              def domain = Domain.global()
              SystemCredentialsProvider.getInstance().getCredentials().findAll { it.id == id }.each {
                  store.removeCredentials(domain, it)
              }
              store.addCredentials(domain, new UsernamePasswordCredentialsImpl(
                  CredentialsScope.GLOBAL, id, "From AWS Secrets Manager", user, pass
              ))
              println("[AWS Secrets] Credential '${id}' ready")
          }

          println("[AWS Secrets] Syncing credentials from AWS Secrets Manager...")
          ["DockerHubCredentials", "RonGitUser"].each { secretId ->
              def secret = fetchSecret(secretId)
              if (secret) {
                  createOrUpdate(secretId, secret.username, secret.password)
              }
          }

    - name: Restart Jenkins container to pick up changes
      docker_container:
        name: "{{ container_name }}"
        state: started
        restart: true